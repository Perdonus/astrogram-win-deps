name: Build Astrogram Windows Deps

on:
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  windows-deps:
    name: Windows deps bundle
    runs-on: windows-2022
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1
          filter: blob:none
          submodules: false
          persist-credentials: false

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Setup MSVC
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: x64

      - name: Resolve prepare paths
        id: prepare_paths
        shell: pwsh
        run: |
          $workspace = (Resolve-Path -LiteralPath $env:GITHUB_WORKSPACE).Path
          $prepareRoot = (Resolve-Path -LiteralPath (Join-Path $workspace "..")).Path
          $libsRoot = Join-Path $prepareRoot "Libraries"
          $win64Root = Join-Path $libsRoot "win64"
          $thirdPartyRoot = Join-Path $prepareRoot "ThirdParty"
          "prepare_root=$prepareRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "libs_root=$libsRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "win64_root=$win64Root" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
          "thirdparty_root=$thirdPartyRoot" | Out-File -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append

      - name: Setup sccache
        uses: mozilla-actions/sccache-action@v0.0.9

      - name: Prepare dependencies (Windows)
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          call Telegram\build\prepare\win.bat silent incremental

      - name: Ensure cmake submodule
        shell: cmd
        run: |
          @echo on
          setlocal EnableExtensions EnableDelayedExpansion
          cd /d "%GITHUB_WORKSPACE%"
          if exist cmake\.git if exist cmake\run_cmake.py exit /b 0
          if exist cmake rmdir /Q /S cmake
          git -c init.defaultBranch=__codex__ init cmake
          git -C cmake remote add origin https://github.com/desktop-app/cmake_helpers.git
          git -C cmake fetch --depth 1 origin ba366ade3e70c64d1dd854382abd74f532ba41a1
          git -C cmake checkout --detach FETCH_HEAD

      - name: Ensure required source mirrors
        shell: pwsh
        run: |
          $moduleLines = @(git config -f .gitmodules --get-regexp "^submodule\..*\.path$")
          $moduleShas = @{
            "Telegram/ThirdParty/GSL" = "87f9d768866548b5b86e72be66c60c5abd4d9b37"
            "Telegram/ThirdParty/QR" = "720f62bddb7226106071d4728c292cb1df519ceb"
            "Telegram/ThirdParty/cld3" = "b48dc46512566f5a2d41118c8c1116c4f96dc661"
            "Telegram/ThirdParty/dispatch" = "886ca22f659c53dae66a40ee8266c7aae9bb97cd"
            "Telegram/ThirdParty/expected" = "292eff8bd8ee230a7df1d6a1c00c4ea0eb2f0362"
            "Telegram/ThirdParty/fcitx5-qt" = "c743b12e6780edf1dcfe9071531c80f050cacb95"
            "Telegram/ThirdParty/hime" = "9b3e6f9ab59d1fe4d9de73d3bf0fed7789f921c5"
            "Telegram/ThirdParty/hunspell" = "22c3381e2066bed616250d373fc5c935598b564a"
            "Telegram/ThirdParty/kcoreaddons" = "fd84da51b554eac25e35b1e3f373edaab3029b15"
            "Telegram/ThirdParty/kimageformats" = "df82311a1081e576c4ac020204578bb8a81b21ec"
            "Telegram/ThirdParty/libprisma" = "23b0d70f9709da9b38561d5706891a134d18df76"
            "Telegram/ThirdParty/lz4" = "5ff839680134437dbf4678f3d0c7b371d84f4964"
            "Telegram/ThirdParty/nimf" = "498ec7ffab3ac140c2469638a14451788f03e798"
            "Telegram/ThirdParty/range-v3" = "a81477931a8aa2ad025c6bda0609f38e09e4d7ec"
            "Telegram/ThirdParty/rlottie" = "8c69fc20cf2e150db304311f1233a4b55a8892d7"
            "Telegram/ThirdParty/tgcalls" = "24876ebca7da10f92dc972225734337f9e793054"
            "Telegram/ThirdParty/xdg-desktop-portal" = "23a76c392170dbbd26230f85ef56c3a57e52b857"
            "Telegram/ThirdParty/xxHash" = "bbb27a5efb85b92a0486cf361a8635715a53f6ba"
            "Telegram/codegen" = "b7517766603d28138d1c8b2743febe754f6f6986"
            "Telegram/lib_base" = "cca87bd2fb4f83bb3fc45d8b59ed8f1d9429d78b"
            "Telegram/lib_crl" = "a41edfcfa8c04057deb8a1a38fca145248a9421a"
            "Telegram/lib_lottie" = "99d8cc4d1820960fbcdafc574f1894073b14b75a"
            "Telegram/lib_qr" = "6fdf60461444ba150e13ac36009c0ffce72c4c83"
            "Telegram/lib_rpl" = "c57cccffb01d85570decd7fccb88419c9a682e63"
            "Telegram/lib_spellcheck" = "476bb43025449ccbd815a14895e9321695a1a177"
            "Telegram/lib_storage" = "ccdc72548a5065b5991b4e06e610d76bc4f6023e"
            "Telegram/lib_tl" = "ba165de0c82be118e66310a94f114a3e342bcadb"
            "Telegram/lib_ui" = "50490486d12b486fb27a09e844ba3adbaca66a3e"
            "Telegram/lib_webrtc" = "553102f8c244609253720e7a03c2ea2d3c7fee8e"
            "Telegram/lib_webview" = "b4a0af279bb55e1caeec3d5f82edae699c3ab251"
          }
          foreach ($line in $moduleLines) {
            $parts = $line -split '\s+', 2
            if ($parts.Count -lt 2) { continue }
            $pathKey = $parts[0]
            $modulePath = $parts[1].Trim()
            if ([string]::IsNullOrWhiteSpace($modulePath) -or $modulePath -eq 'cmake') { continue }
            $modulePrefix = $pathKey.Substring(0, $pathKey.Length - 5)
            $moduleUrl = (git config -f .gitmodules --get "$modulePrefix.url").Trim()
            $moduleSha = $moduleShas[$modulePath]
            $target = Join-Path $env:GITHUB_WORKSPACE $modulePath
            if (Test-Path -LiteralPath $target) { Remove-Item -LiteralPath $target -Recurse -Force }
            git -c init.defaultBranch=__codex__ init $target
            git -C $target remote add origin $moduleUrl
            git -C $target fetch --depth 1 origin $moduleSha
            git -C $target checkout --detach FETCH_HEAD
          }

      - name: Pack dependency bundles
        shell: pwsh
        run: |
          $ErrorActionPreference = 'Stop'
          $out = Join-Path $env:RUNNER_TEMP 'deps-out'
          New-Item -ItemType Directory -Path $out -Force | Out-Null
          tar --zstd -cf (Join-Path $out 'astrogram-win-libs.tar.zst') -C '${{ steps.prepare_paths.outputs.prepare_root }}/Libraries' win64
          tar --zstd -cf (Join-Path $out 'astrogram-win-thirdparty.tar.zst') -C '${{ steps.prepare_paths.outputs.prepare_root }}' ThirdParty
          tar --zstd -cf (Join-Path $out 'astrogram-win-sources.tar.zst') -C $env:GITHUB_WORKSPACE cmake Telegram/codegen Telegram/lib_base Telegram/lib_crl Telegram/lib_lottie Telegram/lib_qr Telegram/lib_rpl Telegram/lib_spellcheck Telegram/lib_storage Telegram/lib_tl Telegram/lib_ui Telegram/lib_webrtc Telegram/lib_webview Telegram/ThirdParty
          Get-ChildItem $out | Select-Object Name,Length | Format-Table -AutoSize

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: astrogram-win-deps-bundles
          path: |
            ${{ runner.temp }}/deps-out/*.tar.zst
          if-no-files-found: error

      - name: Publish latest release assets
        uses: softprops/action-gh-release@v2
        with:
          tag_name: latest
          name: Latest Windows deps bundle
          prerelease: true
          make_latest: true
          files: |
            ${{ runner.temp }}/deps-out/astrogram-win-libs.tar.zst
            ${{ runner.temp }}/deps-out/astrogram-win-thirdparty.tar.zst
            ${{ runner.temp }}/deps-out/astrogram-win-sources.tar.zst
